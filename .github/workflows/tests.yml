name: Tests & Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  python-quality:
    name: Python Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort pytest pytest-cov

    - name: Check Python syntax (flake8)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Check code style (black)
      run: black --check . || true

    - name: Check import ordering (isort)
      run: isort --check-only . || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov websockets

    - name: Run addon tests
      run: |
        cd tests
        pytest test_addon_connection.py -v --tb=short

    - name: Run server tests
      run: |
        cd tests
        pytest test_gpu_backend.py test_pass_streaming.py -v --tb=short || true

  addon-validation:
    name: Addon Installation Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Check addon structure
      run: |
        echo "Checking addon structure..."
        test -f addon/__init__.py || exit 1
        test -f addon/connection.py || exit 1
        test -f addon/engine.py || exit 1
        test -f addon/preferences.py || exit 1
        test -f addon/operators.py || exit 1
        echo "✓ Addon structure valid"

    - name: Validate Python syntax
      run: |
        python -m py_compile addon/__init__.py
        python -m py_compile addon/connection.py
        python -m py_compile addon/engine.py
        python -m py_compile addon/preferences.py
        python -m py_compile addon/operators.py
        echo "✓ All addon files have valid Python syntax"

    - name: Check addon metadata
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')

        # Check bl_info in __init__.py
        with open('addon/__init__.py') as f:
            content = f.read()
            required_fields = ['bl_info', 'register', 'unregister']
            for field in required_fields:
                if field not in content:
                    print(f'Missing {field}')
                    sys.exit(1)
        print('✓ Addon metadata valid')
        "

  diagnostic-tools-check:
    name: Diagnostic Tools Validation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install websockets

    - name: Validate connectivity_diagnostics.py
      run: |
        python -m py_compile tools/connectivity_diagnostics.py
        echo "✓ connectivity_diagnostics.py syntax valid"

    - name: Validate server_health_check.py
      run: |
        python -m py_compile tools/server_health_check.py
        echo "✓ server_health_check.py syntax valid"

    - name: Test diagnostic imports
      run: |
        cd tools
        python -c "
        import sys
        sys.path.insert(0, '.')
        from connectivity_diagnostics import ConnectivityDiagnostics, DiagnosticReporter, LatencyHistogram
        from server_health_check import ServerHealthChecker
        print('✓ All diagnostic tools import successfully')
        "

  mock-connection-test:
    name: Mock Connection Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install websockets

    - name: Test connectivity diagnostics (mock)
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'tools')
        from connectivity_diagnostics import ConnectivityDiagnostics

        # Test report generation
        diag = ConnectivityDiagnostics('localhost', 9999, timeout=1)

        # Try to generate reports (will fail to connect, but tests the code path)
        try:
            diag.test_tcp_connectivity()
        except:
            pass

        # Test report export
        json_report = diag.reporter.to_json()
        html_report = diag.reporter.to_html()

        assert 'summary' in json_report
        assert 'test results' in html_report.lower()
        print('✓ Report generation works')
        "

  build-addon-zip:
    name: Build Addon Package
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build addon zip
      run: |
        if [ -f build_addon.sh ]; then
          bash build_addon.sh
          echo "✓ Addon zip created"
        else
          echo "⚠ build_addon.sh not found, skipping"
        fi

    - name: Verify addon zip
      run: |
        if [ -f blender_remote_gpu_addon_latest.zip ]; then
          unzip -t blender_remote_gpu_addon_latest.zip > /dev/null
          echo "✓ Addon zip is valid"
        fi

  status-badge:
    name: Test Status
    needs: [python-quality, unit-tests, addon-validation, diagnostic-tools-check, mock-connection-test]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.python-quality.result }}" != "failure" ] && \
           [ "${{ needs.unit-tests.result }}" != "failure" ] && \
           [ "${{ needs.addon-validation.result }}" != "failure" ]; then
          echo "✓ All checks passed"
          exit 0
        else
          echo "✗ Some checks failed"
          exit 1
        fi
